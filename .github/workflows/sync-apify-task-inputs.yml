name: Sync Apify Task Inputs

on:
  push:
    branches: [ "main" ]
    paths:
      - "actors/**/task_input.json"
      - "tools/apify_tasks_map.json"
      - ".github/workflows/sync-apify-task-inputs.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync task inputs
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          node tools/sync_apify_task_inputs.cjs tools/apify_tasks_map.json
