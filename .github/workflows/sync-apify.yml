name: Sync Apify Task Inputs

on:
  workflow_dispatch:
  push:
    paths:
      - "actors/**/task_input.json"
      - "tools/apify_tasks_map.json"
      - "tools/sync_apify_tasks.js"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (node-fetch)
        run: npm init -y && npm install node-fetch@3

      - name: Sync task inputs to Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node tools/sync_apify_tasks.js tools/apify_tasks_map.json
