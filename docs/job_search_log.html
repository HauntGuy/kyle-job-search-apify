<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Job Search Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    .meta { color: #444; margin-bottom: 12px; }
    iframe { width: 100%; height: calc(100vh - 80px); border: 1px solid #ddd; border-radius: 8px; }
    code { background: #f5f5f5; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="meta">If the log looks stale, refresh this page.</div>

  <!-- Replace the GIST_ID below -->
  <script>
    const GIST_ID = "9db067b3e3d472ddafd58fd3705ed10c"; // <-- replace if needed
    const FILENAME = "job_search_log.html";
    const RAW_URL = `https://gist.githubusercontent.com/HauntGuy/${GIST_ID}/raw/${FILENAME}`;

    // We render it in an iframe using srcdoc to avoid content-type issues.
    fetch(RAW_URL, { cache: "no-store" })
      .then(r => r.text())
      .then(html => {
        const iframe = document.getElementById("viewer");
        iframe.srcdoc = html;
        document.getElementById("rawlink").href = RAW_URL;
      })
      .catch(err => {
        document.getElementById("status").textContent =
          "Failed to fetch gist content. Error: " + (err?.message || err);
      });
  </script>

  <div id="status" class="meta">
    Raw gist URL: <a id="rawlink" target="_blank" rel="noopener">loading…</a>
  </div>

  <iframe id="viewer" sandbox="allow-same-origin"></iframe>
</body>
</html>
